    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <style>
        body {
            background-color: #efefef;
            color: #000000;
            font-family: "MS PGothic", "MS Pゴシック", sans-serif;
            margin: 20px;
        }

        .container {
            width: 800px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 2px solid #000000;
            padding: 15px;
        }

        h1 {
            color: #ffffff;
            background-color: #800080;
            padding: 5px;
            font-size: 20px;
            text-align: center;
            margin: -15px -15px 15px -15px;
        }

        table.layout {
            width: 100%;
            border-collapse: collapse;
        }

        table.layout td {
            border: 1px solid #cccccc;
            padding: 10px;
        }

        .label {
            background-color: #f0f0f0;
            font-weight: bold;
            width: 150px;
            font-size: 13px;
        }

        .color-preview {
            width: 50px;
            height: 50px;
            border: 2px inset #ffffff;
            display: inline-block;
            vertical-align: middle;
        }

        .swatch-grid {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .swatch {
            width: 100px;
            height: 60px;
            border: 1px solid #000;
            cursor: pointer;
            text-align: center;
            font-size: 10px;
            background-color: #fff;
        }

        .swatch-color {
            height: 40px;
            width: 100%;
            border-bottom: 1px solid #000;
        }

        button {
            background-color: #cccccc;
            border: 2px outset #ffffff;
            padding: 4px 10px;
            cursor: pointer;
            font-family: inherit;
        }

        button:active {
            border: 2px inset #ffffff;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            border-top: 1px dotted #999999;
            padding-top: 10px;
        }

        a {
            color: #0000ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎨 配色パレット (Color Palette)</h1>

        <div id="root"></div>

        <div class="footer">
            [ <a href="https://00portal.kotojisamadake-tool.workers.dev/">便利ツール集ポータルへ戻る</a> ]
        </div>
    </div>

    <script type="text/babel">
        // Helper functions
        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = s = 0; }
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
        }

        function hslToHex(h, s, l) {
            h = ((h % 360) + 360) % 360;
            s = s / 100;
            l = l / 100;
            const a = s * Math.min(l, 1 - l);
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        const PaletteSection = ({ title, colors, onCopy }) => (
            <div style={{ marginBottom: '15px' }}>
                <div style={{ fontSize: '12px', fontWeight: 'bold', borderBottom: '1px solid #ccc' }}>{title}</div>
                <div class="swatch-grid">
                    {colors.map(c => (
                        <div key={c.hex} class="swatch" onClick={() => onCopy(c.hex)}>
                            <div class="swatch-color" style={{ backgroundColor: c.hex }}></div>
                            <div>{c.hex.toUpperCase()}</div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const App = () => {
            const [baseColor, setBaseColor] = React.useState('#6366f1');

            const generatePalettes = (baseHex) => {
                const [h, s, l] = hexToHSL(baseHex);
                return {
                    complementary: [
                        { hex: baseHex, label: 'ベース' },
                        { hex: hslToHex(h + 180, s, l), label: '補色' },
                        { hex: hslToHex(h, s, Math.min(l + 20, 95)), label: 'ライト' },
                        { hex: hslToHex(h + 180, s, Math.min(l + 20, 95)), label: '補色L' },
                        { hex: hslToHex(h, s, Math.max(l - 20, 5)), label: 'ダーク' },
                    ],
                    analogous: [
                        { hex: hslToHex(h - 30, s, l), label: '-30' },
                        { hex: hslToHex(h - 15, s, l), label: '-15' },
                        { hex: baseHex, label: 'ベース' },
                        { hex: hslToHex(h + 15, s, l), label: '+15' },
                        { hex: hslToHex(h + 30, s, l), label: '+30' },
                    ]
                };
            };

            const palettes = generatePalettes(baseColor);

            const copyHex = (hex) => {
                navigator.clipboard.writeText(hex);
                alert("コピーしました: " + hex);
            };

            const randomColor = () => {
                const hex = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
                setBaseColor(hex);
            };

            return (
                <div>
                    <table class="layout">
                        <tr>
                            <td class="label">ベースカラー</td>
                            <td>
                                <input type="color" value={baseColor} onChange={(e) => setBaseColor(e.target.value)} style={{ verticalAlign: 'middle' }} />
                                <input type="text" value={baseColor} style={{ marginLeft: '10px', width: '80px' }} readOnly />
                                <button onClick={randomColor} style={{ marginLeft: '10px' }}>🎲 ランダム</button>
                            </td>
                        </tr>
                        <tr>
                            <td class="label">配色パターン</td>
                            <td>
                                <PaletteSection title="補色パターン (Complementary)" colors={palettes.complementary} onCopy={copyHex} />
                                <PaletteSection title="類似色パターン (Analogous)" colors={palettes.analogous} onCopy={copyHex} />
                            </td>
                        </tr>
                    </table>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
